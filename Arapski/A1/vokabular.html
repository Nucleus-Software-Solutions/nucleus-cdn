<!DOCTYPE html>
<html lang="bs" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arapski A1 - Vokabular</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0f1a;
      color: #e0d5c1;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 28px 20px 20px;
      text-align: center;
      border-bottom: 2px solid #c9a84c;
    }

    header h1 {
      font-size: 1.6rem;
      color: #c9a84c;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 0.85rem;
      color: #a89b80;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 14px 16px;
      background: #0f1525;
      border-bottom: 1px solid #1e2a40;
    }

    .controls button {
      padding: 7px 14px;
      border: 1px solid #2a3550;
      border-radius: 20px;
      background: #131b2e;
      color: #a89b80;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .controls button:hover,
    .controls button.active {
      background: #c9a84c;
      color: #0a0f1a;
      border-color: #c9a84c;
    }

    .toggle-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px 0;
      background: #0f1525;
    }

    .toggle-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #2d6a4f;
      background: #0d1f15;
      color: #4da87a;
    }

    .toggle-btn:hover {
      background: #143d28;
    }

    .toggle-btn.hiding {
      border-color: #8b3a3a;
      background: #1f0d0d;
      color: #d46a6a;
    }

    .toggle-btn.hiding:hover {
      background: #2a1515;
    }

    .search-box {
      width: 100%;
      max-width: 340px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid #2a3550;
      background: #131b2e;
      color: #e0d5c1;
      font-size: 0.85rem;
      outline: none;
    }

    .search-box::placeholder {
      color: #555;
    }

    .search-box:focus {
      border-color: #c9a84c;
    }

    .stats {
      text-align: center;
      padding: 8px;
      font-size: 0.78rem;
      color: #666;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      padding: 12px 16px 30px;
    }

    .card {
      background: #131b2e;
      border: 1px solid #1e2a40;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .card:hover {
      border-color: #c9a84c;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(201, 168, 76, 0.1);
    }

    .card.learned {
      border-color: #2d6a4f;
      background: #0d1f15;
    }

    .card.hidden-learned {
      display: none;
    }

    .card .left {
      flex: 1;
      min-width: 0;
    }

    .card .arabic {
      font-size: 1.55rem;
      color: #c9a84c;
      font-family: 'Traditional Arabic', 'Scheherazade', serif;
      direction: rtl;
      line-height: 1.4;
    }

    .card .trans {
      font-size: 0.82rem;
      color: #7a8baa;
      margin-top: 2px;
    }

    .card .bs {
      font-size: 0.92rem;
      color: #d0c5a9;
      margin-top: 1px;
    }

    .card .cat-tag {
      font-size: 0.65rem;
      color: #555;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card .check {
      font-size: 1.2rem;
      color: #2a3550;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid #2a3550;
      transition: all 0.2s;
    }

    .card.learned .check {
      color: #2d6a4f;
      border-color: #2d6a4f;
      background: #143d28;
    }

    .progress-bar {
      height: 3px;
      background: #1e2a40;
    }

    .progress-bar .fill {
      height: 100%;
      background: #c9a84c;
      transition: width 0.3s;
    }

    .loading-msg {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 0.9rem;
    }

  </style>
</head>

<body>
  <div class="progress-bar">
    <div class="fill" id="progFill"></div>
  </div>
  <header>
    <h1>Arapski A1 — Vokabular</h1>
    <p>Sve riječi iz kursa · Klikni karticu da označiš kao naučeno</p>
  </header>

  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="Pretraži (bosanski ili arapski)...">
    <button class="active" data-cat="all">Sve</button>
    <button data-cat="porodica">Porodica</button>
    <button data-cat="glagoli">Glagoli</button>
    <button data-cat="pridjevi">Pridjevi</button>
    <button data-cat="mjesta">Mjesta</button>
    <button data-cat="zamjenice">Zamjenice</button>
    <button data-cat="pitanja">Pitanja/Prijedlozi</button>
    <button data-cat="vrijeme">Vrijeme</button>
  </div>
  <div class="toggle-row">
    <button class="toggle-btn" id="toggleLearned">👁 Sakrij naučene</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid">
    <div class="loading-msg">Učitavanje...</div>
  </div>

  <script>
    const words = [
      // Porodica
      { ar: 'أُسْرَة', tr: 'usra', bs: 'porodica', cat: 'porodica' },
      { ar: 'عَائِلَة', tr: "'ā'ila", bs: 'porodica (alt.)', cat: 'porodica' },
      { ar: 'أَب', tr: 'ab', bs: 'otac', cat: 'porodica' },
      { ar: 'أُم', tr: 'umm', bs: 'majka', cat: 'porodica' },
      { ar: 'اِبْن', tr: 'ibn', bs: 'sin', cat: 'porodica' },
      { ar: 'بِنْت', tr: 'bint', bs: 'kćerka / djevojčica', cat: 'porodica' },
      { ar: 'أَخ', tr: 'akh', bs: 'brat', cat: 'porodica' },
      { ar: 'أُخْت', tr: 'ukht', bs: 'sestra', cat: 'porodica' },
      { ar: 'زَوْج', tr: 'zawj', bs: 'suprug', cat: 'porodica' },
      { ar: 'زَوْجَة', tr: 'zawja', bs: 'supruga', cat: 'porodica' },
      { ar: 'جَد', tr: 'jadd', bs: 'djed', cat: 'porodica' },
      { ar: 'جَدَّة', tr: 'jadda', bs: 'nena', cat: 'porodica' },
      { ar: 'عَمَّة', tr: "'amma", bs: 'tetka (strina)', cat: 'porodica' },
      { ar: 'خَال', tr: 'khāl', bs: 'daidža', cat: 'porodica' },
      { ar: 'خَالَة', tr: 'khāla', bs: 'tetka (dainica)', cat: 'porodica' },
      { ar: 'شَجَرَة', tr: 'šajara', bs: 'stablo', cat: 'porodica' },
      // Pridjevi
      { ar: 'مُتَزَوِّج', tr: 'mutazawwidž', bs: 'oženjen', cat: 'pridjevi' },
      { ar: 'مُتَزَوِّجَة', tr: 'mutazawwidža', bs: 'udata', cat: 'pridjevi' },
      { ar: 'أَعْزَب', tr: "a'zab", bs: 'neoženjen', cat: 'pridjevi' },
      // Glagoli
      { ar: 'أُنْظُرْ', tr: 'unẓur', bs: 'gledaj! (imperativ)', cat: 'glagoli' },
      { ar: 'اِسْتَمِعْ', tr: "istami'", bs: 'slušaj! (imperativ)', cat: 'glagoli' },
      { ar: 'اِقْرَأْ', tr: "iqra'", bs: 'čitaj! (imperativ)', cat: 'glagoli' },
      { ar: 'زَارَ', tr: 'zāra', bs: 'posjetio je (perfekt)', cat: 'glagoli' },
      { ar: 'يَزُورُ', tr: 'yazūru', bs: 'posjećuje (prezent)', cat: 'glagoli' },
      // Mjesta
      { ar: 'مَطْبَخ', tr: 'maṭbakh', bs: 'kuhinja', cat: 'mjesta' },
      { ar: 'مُسْتَشْفَى', tr: 'mustaŝfa', bs: 'bolnica', cat: 'mjesta' },
      // Zamjenice
      { ar: 'أَنَا', tr: 'anā', bs: 'ja', cat: 'zamjenice' },
      { ar: 'أَنْتَ', tr: 'anta', bs: 'ti (m.r.)', cat: 'zamjenice' },
      { ar: 'أَنْتِ', tr: 'anti', bs: 'ti (ž.r.)', cat: 'zamjenice' },
      { ar: 'هُوَ', tr: 'huwa', bs: 'on', cat: 'zamjenice' },
      { ar: 'هِيَ', tr: 'hiya', bs: 'ona', cat: 'zamjenice' },
      // Pitanja i prijedlozi
      { ar: 'أَيْنَ', tr: 'ayna', bs: 'gdje', cat: 'pitanja' },
      { ar: 'فِي', tr: 'fī', bs: 'u (prijedlog)', cat: 'pitanja' },
      // Vrijeme
      { ar: 'عُمْر', tr: "'umr", bs: 'dob, starost', cat: 'vrijeme' },
      { ar: 'شَهْر', tr: 'šahr', bs: 'mjesec', cat: 'vrijeme' },
      { ar: 'أَشْهُر', tr: 'ašhur', bs: 'mjeseci (množina)', cat: 'vrijeme' },
      { ar: 'سَنَة', tr: 'sana', bs: 'godina', cat: 'vrijeme' },
      { ar: 'سَنَوَات', tr: 'sanawāt', bs: 'godine (množina)', cat: 'vrijeme' },
    ];

    let learned = {};
    let activeCategory = 'all';
    let hideLearned = false;
    let storageAvailable = false;

    function loadLearned() {
      try {
        const data = localStorage.getItem('a1-vokabular-learned');
        if (data) learned = JSON.parse(data);
        storageAvailable = true;
      } catch (e) {
        storageAvailable = false;
      }
      render();
    }

    function saveLearned() {
      if (!storageAvailable) return;
      try {
        localStorage.setItem('a1-vokabular-learned', JSON.stringify(learned));
      } catch (e) { /* silent */ }
    }

    function render(filter) {
      if (filter === undefined) filter = document.getElementById('search').value;
      const grid = document.getElementById('grid');
      const f = filter.toLowerCase();
      const filtered = words.filter(w => {
        const catOk = activeCategory === 'all' || w.cat === activeCategory;
        const searchOk = !f || w.ar.includes(f) || w.bs.toLowerCase().includes(f) || w.tr.toLowerCase().includes(f);
        return catOk && searchOk;
      });

      let visibleCount = 0;
      grid.innerHTML = filtered.map(w => {
        const idx = words.indexOf(w);
        const isLearned = learned[idx];
        const shouldHide = hideLearned && isLearned;
        if (!shouldHide) visibleCount++;
        return `<div class="card ${isLearned ? 'learned' : ''} ${shouldHide ? 'hidden-learned' : ''}" onclick="toggle(${idx})">
  <div class="left">
    <div class="arabic">${w.ar}</div>
    <div class="trans">${w.tr}</div>
    <div class="bs">${w.bs}</div>
    <div class="cat-tag">${w.cat}</div>
  </div>
  <div class="check">${isLearned ? '✓' : ''}</div>
</div>`;
      }).join('');

      const total = words.length;
      const learnedCount = Object.keys(learned).length;
      document.getElementById('stats').textContent = `${learnedCount}/${total} naučeno · Prikazano: ${visibleCount}`;
      document.getElementById('progFill').style.width = `${(learnedCount / total) * 100}%`;

      const btn = document.getElementById('toggleLearned');
      if (hideLearned) {
        btn.textContent = '👁 Prikaži naučene';
        btn.classList.add('hiding');
      } else {
        btn.textContent = '👁 Sakrij naučene';
        btn.classList.remove('hiding');
      }
    }

    function toggle(idx) {
      if (learned[idx]) delete learned[idx];
      else learned[idx] = true;
      saveLearned();
      render();
    }

    document.getElementById('search').addEventListener('input', e => render(e.target.value));

    document.querySelectorAll('.controls button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        render();
      });
    });

    document.getElementById('toggleLearned').addEventListener('click', () => {
      hideLearned = !hideLearned;
      render();
    });

    loadLearned();
  </script>

  <footer style="text-align:center;padding:30px;color:#555;font-size:0.8rem;">
    <a href="index.html" style="color:#c9a84c;text-decoration:none;">Početna</a> &middot;
    <a href="gradivo.html" style="color:#c9a84c;text-decoration:none;">Gradivo</a> &middot;
    <a href="vjezbe.html" style="color:#c9a84c;text-decoration:none;">Vježbe</a> &middot;
    <a href="vokabular.html" style="color:#c9a84c;text-decoration:none;">Vokabular</a>
  </footer>
</body>

</html>
