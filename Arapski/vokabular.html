<!DOCTYPE html>
<html lang="bs" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arapski — Vokabular</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0f1a;
      color: #e0d5c1;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 28px 20px 20px;
      text-align: center;
      border-bottom: 2px solid #c9a84c;
    }

    header h1 {
      font-size: 1.6rem;
      color: #c9a84c;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 0.85rem;
      color: #a89b80;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 14px 16px;
      background: #0f1525;
      border-bottom: 1px solid #1e2a40;
    }

    .controls button {
      padding: 7px 14px;
      border: 1px solid #2a3550;
      border-radius: 20px;
      background: #131b2e;
      color: #a89b80;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .controls button:hover,
    .controls button.active {
      background: #c9a84c;
      color: #0a0f1a;
      border-color: #c9a84c;
    }

    .level-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px 0;
      background: #0f1525;
    }

    .level-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #2a3550;
      background: #131b2e;
      color: #a89b80;
    }

    .level-btn:hover {
      border-color: #c9a84c;
    }

    .level-btn.active {
      background: #c9a84c;
      color: #0a0f1a;
      border-color: #c9a84c;
    }

    .toggle-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px 0;
      background: #0f1525;
    }

    .toggle-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #2d6a4f;
      background: #0d1f15;
      color: #4da87a;
    }

    .toggle-btn:hover {
      background: #143d28;
    }

    .toggle-btn.hiding {
      border-color: #8b3a3a;
      background: #1f0d0d;
      color: #d46a6a;
    }

    .toggle-btn.hiding:hover {
      background: #2a1515;
    }

    .search-box {
      width: 100%;
      max-width: 340px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid #2a3550;
      background: #131b2e;
      color: #e0d5c1;
      font-size: 0.85rem;
      outline: none;
    }

    .search-box::placeholder {
      color: #555;
    }

    .search-box:focus {
      border-color: #c9a84c;
    }

    .stats {
      text-align: center;
      padding: 8px;
      font-size: 0.78rem;
      color: #666;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      padding: 12px 16px 30px;
    }

    .card {
      background: #131b2e;
      border: 1px solid #1e2a40;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .card:hover {
      border-color: #c9a84c;
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(201, 168, 76, 0.1);
    }

    .card.learned {
      border-color: #2d6a4f;
      background: #0d1f15;
    }

    .card.hidden-learned {
      display: none;
    }

    .card .left {
      flex: 1;
      min-width: 0;
    }

    .card .arabic {
      font-size: 1.55rem;
      color: #c9a84c;
      font-family: 'Traditional Arabic', 'Scheherazade', serif;
      direction: rtl;
      line-height: 1.4;
    }

    .card .trans {
      font-size: 0.82rem;
      color: #7a8baa;
      margin-top: 2px;
    }

    .card .bs {
      font-size: 0.92rem;
      color: #d0c5a9;
      margin-top: 1px;
    }

    .card .meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      align-items: center;
    }

    .card .cat-tag {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card .level-tag {
      font-size: 0.6rem;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .card .level-tag.a0 {
      background: #1a2e1a;
      color: #4da87a;
    }

    .card .level-tag.a1 {
      background: #2e2010;
      color: #c9a84c;
    }

    .card .check {
      font-size: 1.2rem;
      color: #2a3550;
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid #2a3550;
      transition: all 0.2s;
    }

    .card.learned .check {
      color: #2d6a4f;
      border-color: #2d6a4f;
      background: #143d28;
    }

    .progress-bar {
      height: 3px;
      background: #1e2a40;
    }

    .progress-bar .fill {
      height: 100%;
      background: #c9a84c;
      transition: width 0.3s;
    }

    .loading-msg {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>

      { ar: 'أُنْظُرْ', tr: 'unzur', bs: 'gledaj! (imperativ)', cat: 'glagoli', lvl: 'A1' },

      { ar: 'مَدِينَةٌ', tr: 'madina', bs: 'grad', cat: 'mjesta', lvl: 'A1' },
      { ar: 'صَفٌّ', tr: 'saff', bs: 'red / razred', cat: 'mjesta', lvl: 'A1' },
      // Zamjenice (A1)
      { ar: 'أَنَا', tr: 'ana', bs: 'ja', cat: 'zamjenice', lvl: 'A1' },
      { ar: 'أَنْتَ', tr: 'anta', bs: 'ti (m.r.)', cat: 'zamjenice', lvl: 'A1' },
      { ar: 'أَنْتِ', tr: 'anti', bs: 'ti (z.r.)', cat: 'zamjenice', lvl: 'A1' },
      { ar: 'هُوَ', tr: 'huwa', bs: 'on', cat: 'zamjenice', lvl: 'A1' },
      { ar: 'هِيَ', tr: 'hiya', bs: 'ona', cat: 'zamjenice', lvl: 'A1' },

      { ar: 'مِنْ', tr: 'min', bs: 'iz, od', cat: 'pitanja', lvl: 'A1' },

      { ar: 'عُمْر', tr: "'umr", bs: 'dob, starost', cat: 'vrijeme', lvl: 'A1' },
      { ar: 'شَهْر', tr: 'sahr', bs: 'mjesec', cat: 'vrijeme', lvl: 'A1' },
      { ar: 'أَشْهُر', tr: 'ashur', bs: 'mjeseci (mnozina)', cat: 'vrijeme', lvl: 'A1' },
      { ar: 'سَنَة', tr: 'sana', bs: 'godina', cat: 'vrijeme', lvl: 'A1' },
      { ar: 'سَنَوَات', tr: 'sanawat', bs: 'godine (mnozina)', cat: 'vrijeme', lvl: 'A1' },
      // Predmeti (A1)
      { ar: 'طَاوِلَةٌ', tr: 'tawila', bs: 'stol', cat: 'predmeti', lvl: 'A1' },
      { ar: 'دَفْتَرٌ', tr: 'daftar', bs: 'teka / sveska', cat: 'predmeti', lvl: 'A1' },
      { ar: 'لُعْبَةٌ', tr: "lu'ba", bs: 'igracka', cat: 'predmeti', lvl: 'A1' },
      { ar: 'قِطَارٌ', tr: 'qitar', bs: 'voz', cat: 'predmeti', lvl: 'A1' },
      { ar: 'دَرْسٌ', tr: 'dars', bs: 'lekcija', cat: 'pojmovi', lvl: 'A1' },
      { ar: 'كِتَابٌ', tr: 'kitab', bs: 'knjiga', cat: 'predmeti', lvl: 'A1' },
      // Redni brojevi (A1)
      { ar: 'أَوَّلُ', tr: 'awwal', bs: 'prvi', cat: 'brojevi', lvl: 'A1' },
      { ar: 'رَابِعٌ', tr: "rabi'", bs: 'cetvrti', cat: 'brojevi', lvl: 'A1' },
    ];

    let learned = {};
    let activeCategory = 'all';
    let activeLevel = 'all';
    let hideLearned = false;
    let storageAvailable = false;

    function loadLearned() {
      try {
        const data = localStorage.getItem('arapski-vokabular-all');
        if (data) learned = JSON.parse(data);
        storageAvailable = true;
      } catch (e) {
        storageAvailable = false;
      }
      render();
    }

    function saveLearned() {
      if (!storageAvailable) return;
      try {
        localStorage.setItem('arapski-vokabular-all', JSON.stringify(learned));
      } catch (e) { /* silent */ }
    }

    function render(filter) {
      if (filter === undefined) filter = document.getElementById('search').value;
      const grid = document.getElementById('grid');
      const f = filter.toLowerCase();
      const filtered = words.filter(w => {
        const catOk = activeCategory === 'all' || w.cat === activeCategory;
        const lvlOk = activeLevel === 'all' || w.lvl === activeLevel;
        const searchOk = !f || w.ar.includes(f) || w.bs.toLowerCase().includes(f) || w.tr.toLowerCase().includes(f);
        return catOk && lvlOk && searchOk;
      });

      let visibleCount = 0;
      grid.innerHTML = filtered.map(w => {
        const idx = words.indexOf(w);
        const isLearned = learned[idx];
        const shouldHide = hideLearned && isLearned;
        if (!shouldHide) visibleCount++;
        return `<div class="card ${isLearned ? 'learned' : ''} ${shouldHide ? 'hidden-learned' : ''}" onclick="toggle(${idx})">
  <div class="left">
    <div class="arabic">${w.ar}</div>
    <div class="trans">${w.tr}</div>
    <div class="bs">${w.bs}</div>
    <div class="meta">
      <span class="cat-tag">${w.cat}</span>
      <span class="level-tag ${w.lvl.toLowerCase()}">${w.lvl}</span>
    </div>
  </div>
  <div class="check">${isLearned ? '\u2713' : ''}</div>
</div>`;
      }).join('');

      const total = words.length;
      const learnedCount = Object.keys(learned).length;
      document.getElementById('stats').textContent = `${learnedCount}/${total} nauceno \u00b7 Prikazano: ${visibleCount}`;
      document.getElementById('progFill').style.width = `${(learnedCount / total) * 100}%`;

      const btn = document.getElementById('toggleLearned');
      if (hideLearned) {
        btn.textContent = '\ud83d\udc41 Prikazi naucene';
        btn.classList.add('hiding');
      } else {
        btn.textContent = '\ud83d\udc41 Sakrij naucene';
        btn.classList.remove('hiding');
      }
    }

    function toggle(idx) {
      if (learned[idx]) delete learned[idx];
      else learned[idx] = true;
      saveLearned();
      render();
    }

    document.getElementById('search').addEventListener('input', e => render(e.target.value));

    document.querySelectorAll('.controls button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        render();
      });
    });

    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeLevel = btn.dataset.level;
        render();
      });
    });

    document.getElementById('toggleLearned').addEventListener('click', () => {
      hideLearned = !hideLearned;
      render();
    });

    loadLearned();
  </script>
